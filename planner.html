<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planner — ChronoFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/grain.css">
  <link rel="stylesheet" href="css/starfield.css">
  <link rel="stylesheet" href="css/shell.css">
  <link rel="stylesheet" href="css/planner.css">
</head>
<body class="planner-body">
  <a href="#main" class="skip-link">Skip to content</a>

  <div class="page-bg">
    <canvas id="bgCanvas" class="page-bg-canvas"></canvas>
    <div class="grain"></div>
  </div>

  <nav class="nav-shell" role="navigation" aria-label="Main navigation">
    <div class="nav-inner">
      <a href="index.html" class="nav-brand">
        <div class="nav-logo"><svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg"></svg></div>
        <span class="nav-brand-text">ChronoFlow</span>
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="planner.html" class="nav-link active">Planner</a>
        <a href="focus.html" class="nav-link">Focus</a>
        <a href="stats.html" class="nav-link">Stats</a>
        <a href="settings.html" class="nav-link">Settings</a>
      </div>
      <button class="theme-toggle" data-theme-toggle aria-label="Toggle theme"></button>
    </div>
  </nav>

  <main id="main" class="planner-shell">
    <!-- Sidebar: Goals + Add Task -->
    <aside class="planner-sidebar">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Backlog</span>
          <button class="btn btn-sm btn-primary" id="addTaskBtn">+ Task</button>
        </div>
        <div class="panel-body" id="taskList">
          <div class="empty-state">No tasks yet.</div>
        </div>
      </div>

      <!-- Add Task Form -->
      <div class="panel" id="taskFormPanel" style="display:none">
        <div class="panel-header">
          <span class="panel-title">New Task</span>
          <button class="btn btn-sm btn-ghost" id="closeTaskFormBtn">✕</button>
        </div>
        <div class="panel-body">
          <form id="taskForm">
            <div class="form-group">
              <label>Title</label>
              <input type="text" name="title" required placeholder="What needs doing?">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Duration (min)</label>
                <input type="number" name="duration" value="30" min="5" max="480">
              </div>
              <div class="form-group">
                <label>Priority (1–5)</label>
                <input type="number" name="priority" value="3" min="1" max="5">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Energy (1–5)</label>
                <input type="number" name="energy" value="3" min="1" max="5">
              </div>
              <div class="form-group">
                <label>Context</label>
                <input type="text" name="context" placeholder="focus / admin / creative">
              </div>
            </div>
            <div class="form-group">
              <label>Deadline</label>
              <input type="datetime-local" name="deadline">
            </div>
            <div class="form-group">
              <label>Notes</label>
              <textarea name="notes" rows="2" placeholder="Optional notes"></textarea>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Add Task</button>
            </div>
          </form>
        </div>
      </div>
    </aside>

    <!-- Main: Schedule -->
    <section class="planner-main">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Schedule</span>
          <div style="display:flex;gap:8px">
            <button class="btn btn-sm btn-secondary" id="seedBtn">Load Examples</button>
            <button class="btn btn-sm btn-primary" id="generateBtn">Generate Plan</button>
          </div>
        </div>
        <div class="panel-body" id="scheduleList">
          <div class="empty-state">Add tasks and time slots, then generate your plan.</div>
        </div>
      </div>
    </section>

    <!-- Detail: Time Slots -->
    <aside class="planner-detail">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Time Slots</span>
          <button class="btn btn-sm btn-primary" id="addSlotBtn">+ Slot</button>
        </div>
        <div class="panel-body" id="slotList">
          <div class="empty-state">No time slots yet.</div>
        </div>
      </div>

      <!-- Add Slot Form -->
      <div class="panel" id="slotFormPanel" style="display:none">
        <div class="panel-header">
          <span class="panel-title">New Slot</span>
          <button class="btn btn-sm btn-ghost" id="closeSlotFormBtn">✕</button>
        </div>
        <div class="panel-body">
          <form id="slotForm">
            <div class="form-group">
              <label>Label</label>
              <input type="text" name="label" placeholder="Morning focus" required>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Start</label>
                <input type="datetime-local" name="start" required>
              </div>
              <div class="form-group">
                <label>End</label>
                <input type="datetime-local" name="end" required>
              </div>
            </div>
            <div class="form-group">
              <label>Energy Level (1–5)</label>
              <input type="number" name="energyLevel" value="3" min="1" max="5">
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Add Slot</button>
            </div>
          </form>
        </div>
      </div>
    </aside>
  </main>

  <div class="toast-container" aria-live="polite"></div>

  <script src="js/db.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/state.js"></script>
  <script src="js/backgrounds.js"></script>
  <script src="js/starfield.js"></script>
  <script src="js/shell.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/planner.js"></script>
</body>
</html>
